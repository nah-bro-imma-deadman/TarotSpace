<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tarot Space · Главная</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <video autoplay muted loop playsinline id="bg-video">
  <source src="video/space.mp4" type="video/mp4">
</video>
<div class="video-overlay"></div>
<div id="app">
  <div class="app-header">
    <h1>✧ TAROT SPACE ✧</h1>
    <div class="subtitle" id="global-subtitle">Узнай свою судьбу сейчас!</div>
  </div>

  <div id="navBar" class="nav-row hidden">
    <button class="nav-icon" id="profileBtn" title="Личный кабинет"><i class="fas fa-user-astronaut"></i></button>
    <button class="nav-icon" id="logoutBtn" title="Выйти"><i class="fas fa-sign-out-alt"></i></button>
  </div>

  <div class="view-container" id="homeContainer">
  </div>

  <div class="footer">
    © 2026 Tarot Space · Вселенная знает
  </div>
</div>
<script src="js/storage.js"></script>
<script src="js/common.js"></script>
<script>
  const user = getCurrentUser();
  const subtitle = document.getElementById('global-subtitle');
  const navBar = document.getElementById('navBar');
  const container = document.getElementById('homeContainer');

  if (user) {
    subtitle.textContent = `✨ ${user.name || user.username}, звёзды ждут тебя ✨`;
    navBar.classList.remove('hidden');
    container.innerHTML = `
      <div class="flex-center" style="justify-content: center; gap: 12px; margin-top: 30px;">
        <button class="btn" onclick="location.href='card-day.html'"><i class="fas fa-star"></i> Карта Дня</button>
        <button class="btn" onclick="location.href='yes-no.html'"><i class="fas fa-scale-balanced"></i> Гадание Да/Нет</button>
        <button class="btn-secondary" onclick="location.href='profile.html'" style="margin-top: 20px;"><i class="fas fa-user-circle"></i> Личный кабинет</button>
      </div>
    `;
  } else {
    subtitle.textContent = 'Узнай свою судьбу сейчас!';
    navBar.classList.add('hidden');
    container.innerHTML = `
      <div class="flex-center" style="margin-top: 50px;">
        <p style="margin-bottom: 24px; font-size: 1.2rem; color: #ddd0f0;">Войдите или создайте аккаунт</p>
        <button class="btn" onclick="location.href='auth.html?mode=login'">Вход</button>
        <button class="btn-secondary" onclick="location.href='auth.html?mode=register'">Регистрация</button>
      </div>
    `;
  }

  document.getElementById('profileBtn')?.addEventListener('click', () => location.href='profile.html');
  document.getElementById('logoutBtn')?.addEventListener('click', () => {
    logout();
    location.href = 'main.html';
  });
</script>
</body>
</html>
